name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs
  cancel-in-progress: true

jobs:
  docc:
    name: Build and Publish DocC Site
    runs-on: macos-15
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.2.app

      - name: Build symbol graphs
        run: |
          swift package dump-symbol-graph
          find .build -type f -name 'ACLoggingPackageTests*.symbols.json' -delete

      - name: Build DocC archive
        run: |
          symbol_graph_dir="$(find .build -type d -name symbolgraph -print -quit)"
          if [[ -z "$symbol_graph_dir" ]]; then
            echo "Unable to find generated symbol graphs in .build." >&2
            exit 1
          fi

          xcrun docc convert Sources/ACLogging/ACLogging.docc \
            --fallback-display-name ACLogging \
            --fallback-bundle-identifier com.antoniocasto.ACLogging \
            --fallback-bundle-version 1.0.0 \
            --additional-symbol-graph-dir "$symbol_graph_dir" \
            --output-path .build/ACLogging.doccarchive

      - name: Package DocC archive
        run: |
          tar -czf ACLogging.doccarchive.tar.gz -C .build ACLogging.doccarchive

      - name: Transform DocC archive for static hosting
        run: |
          xcrun docc process-archive transform-for-static-hosting .build/ACLogging.doccarchive \
            --hosting-base-path ACLogging \
            --output-path ./docs-site

      - name: Verify documentation site output
        run: |
          test -f ./docs-site/index.html
          test -f ./docs-site/documentation/aclogging/index.html
          test ! -e ./docs-site/documentation/acloggingpackagetests/index.html

      - name: Upload DocC archive
        uses: actions/upload-artifact@v4
        with:
          name: ACLogging.doccarchive
          path: ACLogging.doccarchive.tar.gz
          retention-days: 7

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs-site

      - id: deployment
        name: Deploy Pages
        uses: actions/deploy-pages@v4
