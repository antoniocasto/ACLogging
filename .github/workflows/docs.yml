name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs
  cancel-in-progress: true

jobs:
  build:
    name: Build DocC Site
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.2.app

      - name: Build DocC archive
        run: |
          xcodebuild docbuild \
            -scheme ACLogging \
            -destination "generic/platform=iOS" \
            -derivedDataPath .derivedData-docs \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO

      - name: Locate DocC archive
        id: docc
        run: |
          archive_path="$(find .derivedData-docs -type d -name 'ACLogging.doccarchive' -print -quit)"
          if [[ -z "$archive_path" ]]; then
            echo "Unable to find ACLogging.doccarchive in .derivedData-docs." >&2
            exit 1
          fi

          echo "archive_path=$archive_path" >> "$GITHUB_OUTPUT"

      - name: Package DocC archive
        run: |
          tar -czf ACLogging.doccarchive.tar.gz -C "$(dirname "${{ steps.docc.outputs.archive_path }}")" ACLogging.doccarchive

      - name: Upload DocC archive
        uses: actions/upload-artifact@v4
        with:
          name: ACLogging.doccarchive
          path: ACLogging.doccarchive.tar.gz
          retention-days: 7
