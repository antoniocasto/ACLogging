name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs
  cancel-in-progress: true

jobs:
  docc:
    name: Build and Publish DocC Site
    runs-on: macos-15
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.2.app

      - name: Build DocC archive
        run: |
          xcodebuild docbuild \
            -scheme ACLogging \
            -destination "generic/platform=iOS" \
            -derivedDataPath .derivedData-docs \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO

      - name: Locate DocC archive
        id: docc
        run: |
          archive_path="$(find .derivedData-docs -type d -name 'ACLogging.doccarchive' -print -quit)"
          if [[ -z "$archive_path" ]]; then
            echo "Unable to find ACLogging.doccarchive in .derivedData-docs." >&2
            exit 1
          fi

          echo "archive_path=$archive_path" >> "$GITHUB_OUTPUT"

      - name: Package DocC archive
        run: |
          tar -czf ACLogging.doccarchive.tar.gz -C "$(dirname "${{ steps.docc.outputs.archive_path }}")" ACLogging.doccarchive

      - name: Transform DocC archive for static hosting
        run: |
          xcrun docc process-archive transform-for-static-hosting "${{ steps.docc.outputs.archive_path }}" \
            --hosting-base-path ACLogging \
            --output-path ./docs-site

      - name: Verify documentation site output
        run: test -d ./docs-site

      - name: Upload DocC archive
        uses: actions/upload-artifact@v4
        with:
          name: ACLogging.doccarchive
          path: ACLogging.doccarchive.tar.gz
          retention-days: 7

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs-site

      - id: deployment
        name: Deploy Pages
        uses: actions/deploy-pages@v4
